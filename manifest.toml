#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "homebox"
name = "HomeBox"
description.en = "Inventory and organization system built for the Home User"
description.fr = "Système d'inventaire et d'organisation conçu pour l'utilisateur à domicile"

version = "0.25.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
website = "https://homebox.software/en/"
demo = "https://demo.homebox.software/home"
admindoc = "https://homebox.software/en/"
code = "https://github.com/sysadminsmedia/homebox"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = [ "amd64", "arm64" ]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "85M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/sysadminsmedia/homebox/releases/download/v0.25.0/homebox_Linux_x86_64.tar.gz"
    amd64.sha256 = "a1437725abdb5e0360e66c9e9ffd7a9ef8df1f823d8fc4ccaf5d567f5df77940"
    arm64.url = "https://github.com/sysadminsmedia/homebox/releases/download/v0.25.0/homebox_Linux_arm64.tar.gz"
    arm64.sha256 = "600261d94b1060b0b7d42a31bc0c3a2125187c5e546a45d4b2908b2bec492e67"

    in_subdir = false
    rename = "homebox"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = ".*Linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = ".*Linux_arm64.tar.gz$"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
